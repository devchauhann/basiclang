  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">

  <!-- Google Fonts -->

    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "BasicLang",
    "url": "https://basiclang.vercel.app",
    "logo": "https://basiclang.vercel.app/icon.webp",
    "description": "Learn programming from scratch to pro with structured lessons and real code examples",
    "sameAs": [

    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "contactType": "Customer Support"
    }
  }
  </script>

  <!-- Styles -->
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      margin: 0;
      padding: 0;
      background-color: rgb(27, 27, 31);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    html:not(.dark) body {
      background-color: white;
    }

    * {
      scroll-behavior: smooth;
    }

    ::selection {
      background-color: rgba(255, 0, 204, 0.3);
    }

    /* Hide scrollbar but allow scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <!-- Theme Script (no flash) -->
  <script>
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'LIGHT') {
      document.documentElement.classList.remove('dark');
    } else {
      document.documentElement.classList.add('dark');
    }
  </script>

  <!-- Import Map -->
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"

}
